name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      uploaded: ${{ steps.upload.outputs.uploaded }}
    steps:
      - uses: actions/checkout@v4
      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists. Updating to published."
            gh release edit "${{ github.ref_name }}" --draft=false
          else
            echo "Creating release ${{ github.ref_name }} as published."
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes "Download the binary for your platform below." \
              --draft=false
          fi
      - id: upload
        run: echo "uploaded=true" >> $GITHUB_OUTPUT

  build:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject GDrive credentials
        run: |
          cp js/gdrive-config.example.js js/gdrive-config.js
          sed -i.bak "s|YOUR_GOOGLE_CLIENT_ID|${{ secrets.GDRIVE_CLIENT_ID }}|g" js/gdrive-config.js && rm -f js/gdrive-config.js.bak
          sed -i.bak "s|YOUR_GOOGLE_CLIENT_SECRET|${{ secrets.GDRIVE_CLIENT_SECRET }}|g" js/gdrive-config.js && rm -f js/gdrive-config.js.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm install

      - name: Prepare dist
        run: mkdir -p dist/js dist/css && cp index.html dist/index.html && cp -r js/. dist/js/ && cp -r css/. dist/css/

      - name: Build Tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload DMG
        if: runner.os == 'macOS'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg 2>/dev/null || true)
          if [ -n "$DMG" ] && [ -f "$DMG" ]; then
            cp "$DMG" "aanote-${{ matrix.target }}.dmg"
            gh release upload "${{ github.ref_name }}" "aanote-${{ matrix.target }}.dmg" --clobber
          else
            echo "ERROR: No DMG found"; exit 1
          fi

      - name: Upload Linux binary
        if: runner.os == 'Linux'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="src-tauri/target/${{ matrix.target }}/release/aanote"
          if [ -f "$BIN" ]; then
            cp "$BIN" "aanote-x86_64-unknown-linux-gnu"
            gh release upload "${{ github.ref_name }}" "aanote-x86_64-unknown-linux-gnu" --clobber
          else
            echo "ERROR: No binary"; exit 1
          fi
