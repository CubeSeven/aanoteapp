name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject GDrive credentials
        run: |
          cp js/gdrive-config.example.js js/gdrive-config.js
          sed -i.bak 's|export const GDRIVE_CLIENT_ID *= *"YOUR_GOOGLE_CLIENT_ID"|export const GDRIVE_CLIENT_ID="${{ secrets.GDRIVE_CLIENT_ID }}"|' js/gdrive-config.js && rm -f js/gdrive-config.js.bak
          sed -i.bak 's|export const GDRIVE_CLIENT_SECRET *= *"YOUR_GOOGLE_CLIENT_SECRET"|export const GDRIVE_CLIENT_SECRET=*** secrets.GDRIVE_CLIENT_SECRET }}"|' js/gdrive-config.js && rm -f js/gdrive-config.js.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm install

      - name: Prepare dist
        run: mkdir -p dist/js dist/css && cp index.html dist/index.html && cp js/* dist/js/ && cp css/* dist/css/

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "v__VERSION__"
          releaseBody: "aanote desktop app — sign in with Google, sync with Drive."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
