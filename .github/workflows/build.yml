name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Download the binary for your platform below." \
            --target "${{ github.sha }}"

  build:
    needs: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject GDrive credentials
        run: |
          cp js/gdrive-config.example.js js/gdrive-config.js
          sed -i.bak 's|export const GDRIVE_CLIENT_ID *= *"YOUR_GOOGLE_CLIENT_ID"|export const GDRIVE_CLIENT_ID="${{ secrets.GDRIVE_CLIENT_ID }}"|' js/gdrive-config.js && rm -f js/gdrive-config.js.bak
          sed -i.bak 's|export const GDRIVE_CLIENT_SECRET *= *"YOUR_GOOGLE_CLIENT_SECRET"|export const GDRIVE_CLIENT_SECRET="${{ secrets.GDRIVE_CLIENT_SECRET }}"|' js/gdrive-config.js && rm -f js/gdrive-config.js.bak

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-tauri
        run: cargo install tauri-cli --version "^2"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm ci

      - name: Prepare dist
        run: mkdir -p dist/js dist/css && cp index.html dist/index.html && cp js/* dist/js/ && cp css/* dist/css/

      - name: Build Tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BIN="src-tauri/target/${{ matrix.target }}/release/aanote${{ matrix.ext }}"
          SUFFIX="${{ matrix.target }}"
          if [ ! -f "$BIN" ]; then
            BIN=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/deb/aanote*.deb 2>/dev/null || true)
            SUFFIX="Linux"
          fi
          if [ -n "$BIN" ] && [ -f "$BIN" ]; then
            cp "$BIN" "aanote-${SUFFIX}"
            gh release upload "${{ github.ref_name }}" "aanote-${SUFFIX}" --clobber
          fi
