name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject GDrive credentials (Unix)
        if: runner.os != 'Windows'
        run: |
          cp js/gdrive-config.example.js js/gdrive-config.js
          sed -i.bak "s|YOUR_GOOGLE_CLIENT_ID|${{ secrets.GDRIVE_CLIENT_ID }}|g" js/gdrive-config.js && rm -f js/gdrive-config.js.bak
          sed -i.bak "s|YOUR_GOOGLE_CLIENT_SECRET|${{ secrets.GDRIVE_CLIENT_SECRET }}|g" js/gdrive-config.js && rm -f js/gdrive-config.js.bak

      - name: Inject GDrive credentials (Windows)
        if: runner.os == 'Windows'
        run: |
          copy js\gdrive-config.example.js js\gdrive-config.js
          powershell -Command "(Get-Content js\gdrive-config.js) -replace 'YOUR_GOOGLE_CLIENT_ID', '${{ secrets.GDRIVE_CLIENT_ID }}' | Set-Content js\gdrive-config.js"
          powershell -Command "(Get-Content js\gdrive-config.js) -replace 'YOUR_GOOGLE_CLIENT_SECRET', '${{ secrets.GDRIVE_CLIENT_SECRET }}' | Set-Content js\gdrive-config.js"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install npm deps
        run: npm ci

      - name: Prepare dist
        run: mkdir -p dist/js dist/css && cp index.html dist/index.html && cp js/* dist/js/ && cp css/* dist/css/

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
