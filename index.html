<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aanote</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="titlebar" data-tauri-drag-region>
    <div id="title-buttons">
      <button id="btn-min" title="Minimize">−</button>
      <button id="btn-max" title="Maximize/Restore">□</button>
      <button id="btn-close" title="Close">×</button>
    </div>
  </div>
  <div id="backdrop"></div>
  <div id="app">
    <aside id="file-navigator" tabindex="0">
      <div id="file-tree"></div>
      <div id="sidebar-footer">
        <button id="btn-settings" title="Settings"></button>
      </div>
    </aside>
    <main id="editor-panel">
      <div id="editor-placeholder">
        <span>add a note</span>
      </div>
      <div id="editor-container" class="hidden">
        <input id="title-input" type="text" placeholder="Untitled" spellcheck="false" autocomplete="off" />
        <div id="cm-host"></div>
      </div>
    </main>
  </div>
  <div id="action-bar">
    <button class="action-btn" id="sidebar-toggle" title="Toggle panel (Ctrl+\)"></button>
    <button class="action-btn" id="btn-new-note" title="New note (F2)"></button>
    <button class="action-btn" id="btn-new-folder" title="New folder (F3)"></button>
    <button class="action-btn" id="btn-search" title="Search (Ctrl+F)"></button>
    <span id="sync-spinner" class="hidden"></span>
  </div>
  <div id="search-modal" class="hidden">
    <div id="search-box">
      <div id="search-box-row">
        <span class="ic" id="search-icon-placeholder"></span>
        <input id="search-input" type="text" placeholder="Search notes... (Esc to cancel)" spellcheck="false" autocomplete="off" />
      </div>
      <div id="search-results"></div>
    </div>
  </div>
  <div id="context-menu" class="hidden">
    <div class="context-item" id="ctx-rename">Rename (F4)</div>
    <div class="context-item" id="ctx-delete">Delete (Del)</div>
  </div>
  <div id="error-banner" class="hidden"></div>
  <div id="settings-modal" class="hidden">
    <div id="settings-box">
      <div id="settings-header">Settings</div>

      <div class="setting-item" id="local-dir-item">
        <span class="setting-label">Local Notes Directory</span>
        <div class="setting-actions">
          <span id="local-dir-path" class="text-muted text-small" style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Not selected</span>
          <button class="setting-btn active" id="btn-import-folder" title="Choose Folder">...</button>
        </div>
      </div>

      <div class="setting-item" id="gdrive-item">
        <span class="setting-label">Google Drive Sync</span>
        <div class="setting-actions">
          <span id="gdrive-status" class="text-muted text-small">Checking...</span>
          <button class="setting-btn hidden" id="btn-gdrive-sync" title="Sync Now"></button>
          <button class="setting-btn hidden" id="btn-gdrive-reset" title="Reset Sync"></button>
          <button class="setting-btn" id="btn-gdrive-connect">Connect</button>
        </div>
      </div>

      <div class="setting-item hidden" id="auto-sync-setting">
        <span class="setting-label">Auto-Sync on Save</span>
        <input type="checkbox" id="chk-auto-sync" checked />
      </div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
